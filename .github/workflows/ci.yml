name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Node packages
        run: npm install pptxgenjs docx

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/MohdSaifHussain/analystkit.git"
          pip install -e ./analystkit-mcp
          pip install -e ./opskit-mcp
          pip install -e ".[dev,ml,docs,stats]"

      - name: Install document verification tools
        run: pip install "markitdown[pptx]"

      - name: Ruff
        run: python -m ruff check src tests

      - name: Mypy (strict)
        run: python -m mypy src/delivery_engine --strict

      - name: Pytest
        run: python -m pytest -q
