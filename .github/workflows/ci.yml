name: CI

# The charter's definition of done (Section 10) requires CI: green
# locally is not the bar, green on push is. This workflow mirrors the
# exact three gates run before every commit — pytest, ruff, mypy strict —
# on the same Python the project targets, plus the Node/pptxgenjs the
# presentation stage needs. If it is not reproducible here from a clean
# checkout, it is not evidence.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — the latest push is what matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # The presentation stage shells out to pptxgenjs. Installed at the
      # repo root so the executor's node_modules discovery finds it, the
      # same location a developer uses locally.
      - name: Install pptxgenjs
        run: npm install pptxgenjs

      # analystkit is a separate public package (git source); the two MCP
      # servers and the engine install editable from the repo. Order:
      # analystkit first (engine depends on it), then the servers, then
      # the engine with its dev + ml extras.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/MohdSaifHussain/analystkit.git"
          pip install -e ./analystkit-mcp
          pip install -e ./opskit-mcp
          pip install -e ".[dev,ml]"

      # markitdown makes the one PPT content-scan test run instead of
      # skip — CI is where the fullest possible suite should execute.
      - name: Install markitdown (enables full PPT test)
        run: pip install "markitdown[pptx]"

      - name: Ruff
        run: python -m ruff check src tests

      - name: Mypy (strict)
        run: python -m mypy src/delivery_engine --strict

      - name: Pytest
        run: python -m pytest -q
