# ops_review - the third archetype (Delivery Engine v0.3/v0.4, steps 7-8)
# Operational review of time-series data: AnalystKit gates fitness,
# OpsKit runs the weekly-review playbook through opskit-mcp, findings
# land sealed in the store, packaged as re-performable evidence.
#
# v1.1 (step 8): the ops_report AI stage renders the findings into a
# narrative under the injected-numbers rule - finding texts injected
# verbatim from the hashed store, provenance proven before emission.

schema_version = 1

[playbook]
name = "ops_review"
version = "1.1.0"
description = "Operational review of incidents, transactions, tickets, or any time-series extract: volume trends, drivers, drill-down evidence, packaged"

[requirements]
min_rows = 1
required_kinds = ["timestamp_column"]
source_types = ["csv", "excel", "sqlite"]

[[stages]]
id = "dq_profile"
kind = "kit"
tool = "analystkit_profile"
gate = "must_pass"

[[stages]]
id = "ops_review"
kind = "kit"
tool = "opskit_run_playbook"
ops_playbook = "weekly-review"
gate = "must_pass"
needs = ["dq_profile"]

[[stages]]
id = "report"
kind = "ai"
slot = "ops_report"
numbers_from = "findings_store"
human_approval = false
feeds_deterministic = false
needs = ["ops_review"]

[[stages]]
id = "package"
kind = "package"
needs = ["ops_review", "report"]

[deliverables]
artifacts = ["ops_findings", "ops_report", "audit_log", "manifest"]
