# churn_analysis — the reference playbook (Delivery Engine v0.1 thin slice)
# Schema: PLAYBOOK_SPEC.md v1 · TOML 1.0.0 (stdlib tomllib)

schema_version = 1

[playbook]
name = "churn_analysis"
version = "1.2.0"
description = "Customer churn analysis: DQ-gated EDA, narrative, packaged as re-performable evidence"

[requirements]
min_rows = 100
required_kinds = ["binary_target", "id_column"]
source_types = ["csv", "excel", "sqlite", "postgres", "mysql"]

# ── Stage 1: the deterministic gate. Nothing runs before this passes. ──
[[stages]]
id = "dq_profile"
kind = "kit"
tool = "analystkit_profile"
gate = "must_pass"

[[stages]]
id = "dq_validate"
kind = "kit"
tool = "analystkit_validate"
gate = "must_pass"
needs = ["dq_profile"]

[[stages]]
id = "dq_dedupe"
kind = "kit"
tool = "analystkit_dedupe"
gate = "advisory"
needs = ["dq_profile"]

# ── Human Gate 1 equivalent inside the run: plan shown, execution approved
[[stages]]
id = "plan_approval"
kind = "human_gate"
needs = ["dq_profile", "dq_validate"]

# ── The deterministic baseline (v1.1, step 10): fixed-seed logistic
# regression on the plan's classified target and features. Metric values
# never gate; training feasibility does. ──
[[stages]]
id = "baseline"
kind = "model"
gate = "must_pass"
needs = ["dq_profile", "dq_validate", "plan_approval"]

# ── AI stages: prose and structure only; every number injected ──
[[stages]]
id = "eda"
kind = "ai"
slot = "eda_notebook"
numbers_from = "findings_store"
human_approval = false
feeds_deterministic = false
needs = ["plan_approval"]

[[stages]]
id = "report"
kind = "ai"
slot = "narrative_report"
numbers_from = "findings_store"
human_approval = false
feeds_deterministic = false
needs = ["eda", "baseline"]

[[stages]]
id = "readme"
kind = "ai"
slot = "readme"
numbers_from = "findings_store"
human_approval = false
feeds_deterministic = false
needs = ["report"]

[[stages]]
id = "presentation"
kind = "ai"
slot = "presentation"
numbers_from = "findings_store"
human_approval = false
feeds_deterministic = false
needs = ["baseline", "report"]

[[stages]]
id = "package"
kind = "package"
needs = ["eda", "report", "readme", "presentation"]

[deliverables]
artifacts = ["eda_notebook", "narrative_report", "readme", "delivery_package", "audit_log", "manifest"]
