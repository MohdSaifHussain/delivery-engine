# universal_audit — descriptive math archetype (step 17)
# What is the SHAPE of every column? DQ-gated, then the full sourced
# descriptive suite over the plan-approved columns: skewness/kurtosis,
# t-intervals, tail percentiles, MAD outliers, distribution fitting
# with the Lilliefors correction, entropy, temporal gaps and trends.
# Requires only an id column — runs on ANY dataset the planner can
# classify. Schema: PLAYBOOK_SPEC.md v1 · TOML 1.0.0 (stdlib tomllib)

schema_version = 1

[playbook]
name = "universal_audit"
version = "1.0.0"
description = "Universal descriptive audit of any dataset: distribution shape, outliers, entropy, temporal structure, quantitative profile for every approved column"

[requirements]
min_rows = 100
required_kinds = ["id_column"]
source_types = ["csv", "parquet", "excel", "sqlite"]

# ── Stage 1: the deterministic gate. Nothing runs before this passes. ──
[[stages]]
id = "dq_profile"
kind = "kit"
tool = "analystkit_profile"
gate = "must_pass"

[[stages]]
id = "dq_validate"
kind = "kit"
tool = "analystkit_validate"
gate = "must_pass"
needs = ["dq_profile"]

[[stages]]
id = "plan_approval"
kind = "human_gate"
needs = ["dq_profile", "dq_validate"]

# ── The descriptive math stage (step 17): fixed, sourced procedures
# over the plan's classified columns. Values never gate; feasibility does.
[[stages]]
id = "math"
kind = "math"
math_checks = "all"
gate = "must_pass"
needs = ["dq_profile", "dq_validate", "plan_approval"]

# ── AI stages: prose and structure only; every number injected ──
[[stages]]
id = "report"
kind = "ai"
slot = "narrative_report"
numbers_from = "findings_store"
human_approval = false
feeds_deterministic = false
needs = ["math"]

[[stages]]
id = "readme"
kind = "ai"
slot = "readme"
numbers_from = "findings_store"
human_approval = false
feeds_deterministic = false
needs = ["report"]

[[stages]]
id = "package"
kind = "package"
needs = ["report", "readme"]

[deliverables]
artifacts = ["narrative_report", "readme", "delivery_package", "audit_log", "manifest"]
